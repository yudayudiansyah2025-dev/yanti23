<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanti: My Eternal Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff0080; --s: #7928ca; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }
        .header-text { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 0.5em; }
        .handwritten { font-family: 'Caveat', cursive; }

        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; }
        
        .hologram-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(121, 40, 202, 0.2);
            width: 100%;
            max-width: 450px;
        }

        /* Animasi Border Berputar */
        .hologram-card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--p), transparent);
            animation: rotate 6s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .inner-card {
            background: #0a0a0a;
            inset: 3px; position: absolute; border-radius: 37px;
            z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 2rem;
        }

        .hero-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 20px;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .hero-img:hover { transform: scale(1.05); }

        .btn-neon {
            background: linear-gradient(45deg, var(--p), var(--s));
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.4);
        }
        .btn-neon:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 0, 128, 0.6); }

        .glow-text { text-shadow: 0 0 15px var(--p); }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <main class="relative z-10 flex items-center justify-center min-h-screen p-4">
        <div class="hologram-card h-[85vh]">
            <div class="inner-card">
                
                <header class="mb-6 text-center">
                    <h1 class="header-text text-[9px] text-gray-500 mb-2">System: Heart Connection</h1>
                    <div class="h-[1px] w-12 bg-pink-500 mx-auto"></div>
                </header>

                <div class="relative w-full mb-6">
                    <img src="yanti2.jpg" class="hero-img" alt="Yanti My Star">
                    <div class="absolute bottom-2 left-0 right-0 text-center">
                        <h2 class="text-3xl handwritten text-white drop-shadow-lg">Yanti</h2>
                    </div>
                </div>

                <div class="text-center space-y-4 mb-8">
                    <p id="typing-text" class="text-gray-400 font-light text-sm leading-relaxed h-12"></p>
                </div>

                <div id="action-area" class="w-full text-center">
                    <button onclick="activateSurprise()" class="btn-neon">
                        Click to Connect ✨
                    </button>
                </div>

                <div id="final-msg" class="hidden text-center animate-bounce">
                    <p class="text-2xl handwritten glow-text text-pink-500">I Love You Beyond the Stars!</p>
                </div>

            </div>
        </div>
    </main>

    <script>
        // Particle Background
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 182, 193, 0.5)';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }

        // Typing Effect
        const text = "Di semesta ini, cuma kamu cahaya paling terang buat aku...";
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 70);
            }
        }

        function activateSurprise() {
            document.getElementById('action-area').style.display = 'none';
            document.getElementById('final-msg').classList.remove('hidden');
            particles.forEach(p => p.speed *= 8);
        }

        window.addEventListener('resize', init);
        init();
        animate();
        setTimeout(typeWriter, 1000);
    </script>
</body>
</html>
